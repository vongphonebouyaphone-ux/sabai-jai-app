<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ສະບາຍໃຈ - ສັ່ງຊື້ຫວຍລາວ/ໄທ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f5f7fb; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #d32f2f, #b71c1c); color: white; padding: 20px 16px; border-radius: 0 0 24px 24px; text-align: center; }
        .header h1 { font-size: 28px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header p { font-size: 14px; opacity: 0.9; margin-top: 6px; }
        .cart-bar { background: #fff3e0; margin: 16px; padding: 12px 16px; border-radius: 40px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .cart-count { background: #d32f2f; color: white; padding: 4px 12px; border-radius: 20px; }
        .checkout-btn { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .form-box { background: white; margin: 16px; padding: 20px; border-radius: 28px; }
        .form-box h3 { margin-bottom: 16px; color: #b71c1c; }
        .form-box select, .form-box input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 16px; }
        .form-box button { background: #d32f2f; color: white; border: none; padding: 12px; width: 100%; border-radius: 32px; font-weight: bold; cursor: pointer; }
        .cart-list { margin: 16px; display: flex; flex-direction: column; gap: 12px; }
        .cart-item { background: white; border-radius: 20px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .cart-item-info { flex: 1; }
        .cart-item-number { font-weight: bold; font-size: 18px; color: #d32f2f; }
        .remove-btn { background: #ffdddd; border: none; padding: 6px 12px; border-radius: 20px; color: #c0392b; cursor: pointer; }
        .empty-msg { text-align: center; padding: 40px; color: #aaa; }
        .total-row { background: #fff3e0; margin: 16px; padding: 16px; border-radius: 20px; font-size: 20px; font-weight: bold; text-align: right; }
        .method-buttons { display: flex; gap: 12px; margin: 16px; }
        .method-buttons button { flex: 1; padding: 14px; border-radius: 40px; font-weight: bold; cursor: pointer; border: none; }
        .fb-btn { background: #1877f2; color: white; }
        .wa-btn { background: #25d366; color: white; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 16px 20px; border-top: 1px solid #eee; }
        .footer button { background: none; border: none; font-size: 16px; font-weight: bold; padding: 8px 16px; border-radius: 40px; cursor: pointer; color: #555; }
        .footer .active { background: #d32f2f; color: white; }
        .hidden { display: none; }
        .seller-info { background: #e3f2fd; margin: 16px; padding: 12px; border-radius: 20px; font-size: 14px; }
        .seller-info textarea { width: 100%; padding: 8px; border-radius: 16px; border: 1px solid #ccc; margin-top: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h1><span>🎰</span> ສະບາຍໃຈ ສັ່ງຊື້ຫວຍ</h1>
    <p>ເລືອກຫວຍລາວ/ໄທ ປ້ອນເລກ ກຳນົດເງິນ ສົ່ງຄຳສັ່ງຜ່ານ Messenger ຫຼື WhatsApp</p>
</div>

<div class="seller-info">
    📢 ຂໍ້ມູນຜູ້ຂາຍ (ປ່ຽນເປັນຂອງທ່ານ):
    <textarea id="sellerInfo" rows="2">ຮ້ານຫວຍສະບາຍໃຈ
ເບີໂທ: 020 98297792
ບໍລິການສັ່ງຊື້ຫວຍອອນລາຍ</textarea>
</div>

<div class="cart-bar">
    <span>🛒 ກະຕ່າຂອງຂ້ອຍ</span>
    <span class="cart-count" id="cartCount">0</span>
    <button class="checkout-btn" id="checkoutBtn">💬 ສັ່ງຊື້</button>
</div>

<div class="form-box">
    <h3>➕ ເພີ່ມເລກຫວຍ</h3>
    <select id="lotteryType">
        <option value="ຫວຍລາວ">🇱🇦 ຫວຍລາວ</option>
        <option value="ຫວຍໄທ">🇹🇭 ຫວຍໄທ</option>
    </select>
    <input type="text" id="lotteryNumber" placeholder="ເລກຫວຍ (ເຊັ່ນ: 1234, 56789)">
    <input type="number" id="betAmount" placeholder="ຈຳນວນເງິນທີ່ຊື້ (ກີບ)" value="1000">
    <button id="addToCartBtn">➕ ເພີ່ມ</button>
</div>

<div id="cartPanel">
    <div id="cartList" class="cart-list"></div>
    <div class="total-row">💰 ລວມທັງໝົດ: <span id="totalAmount">0</span> ກີບ</div>
</div>

<div class="method-buttons">
    <button id="sendFBBtn" class="fb-btn">📘 ສົ່ງຜ່ານ Messenger</button>
    <button id="sendWABtn" class="wa-btn">💚 ສົ່ງຜ່ານ WhatsApp</button>
</div>

<div class="footer">
    <button id="footerCartBtn" class="active">🛒 ສັ່ງຊື້</button>
</div>

<script>
    let cart = [];

    function saveCart() {
        localStorage.setItem("lottery_cart", JSON.stringify(cart));
        renderCart();
    }

    function loadCart() {
        const stored = localStorage.getItem("lottery_cart");
        if(stored) cart = JSON.parse(stored);
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById("cartList");
        const cartCount = document.getElementById("cartCount");
        const totalSpan = document.getElementById("totalAmount");
        
        if(cart.length === 0) {
            container.innerHTML = '<div class="empty-msg">😢 ຍັງບໍ່ມີລາຍການໃນກະຕ່າ</div>';
            cartCount.innerText = "0";
            totalSpan.innerText = "0";
            return;
        }
        
        let total = 0;
        container.innerHTML = cart.map((item, index) => {
            total += item.amount;
            return `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-number">🔢 ${item.number}</div>
                        <div>${item.type} | ຈຳນວນ: ${item.amount.toLocaleString()} ກີບ</div>
                    </div>
                    <button class="remove-btn" data-index="${index}">❌ ລຶບ</button>
                </div>
            `;
        }).join('');
        
        cartCount.innerText = cart.length;
        totalSpan.innerText = total.toLocaleString();
        
        document.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.index);
                cart.splice(idx, 1);
                saveCart();
            });
        });
    }

    function addToCart() {
        const type = document.getElementById("lotteryType").value;
        const number = document.getElementById("lotteryNumber").value.trim();
        const amount = parseInt(document.getElementById("betAmount").value);
        
        if(!number) {
            alert("ກະລຸນາປ້ອນເລກຫວຍ");
            return;
        }
        if(isNaN(amount) || amount < 1000) {
            alert("ຈຳນວນເງິນຕ້ອງຫຼາຍກວ່າ 1,000 ກີບ");
            return;
        }
        
        cart.push({ type, number, amount, date: Date.now() });
        saveCart();
        
        document.getElementById("lotteryNumber").value = "";
        document.getElementById("betAmount").value = "1000";
        alert("✅ ເພີ່ມເຂົ້າກະຕ່າແລ້ວ");
    }

    function getOrderMessage() {
        const sellerInfo = document.getElementById("sellerInfo").value;
        const date = new Date().toLocaleString('lo-LA');
        let total = 0;
        let itemsList = "";
        
        cart.forEach((item, idx) => {
            total += item.amount;
            itemsList += `%0A🔹 ${idx+1}. ${item.type} | ເລກ: ${item.number} | ${item.amount.toLocaleString()} ກີບ`;
        });
        
        let message = `🛒 *ຄຳສັ່ງຊື້ຫວຍ*%0A`;
        message += `📅 ວັນທີ: ${date}%0A`;
        message += `%0A📋 *ລາຍການທີ່ສັ່ງ:*%0A${itemsList}%0A`;
        message += `%0A💰 *ລວມທັງໝົດ: ${total.toLocaleString()} ກີບ*%0A`;
        message += `%0A--- ຂໍ້ມູນຜູ້ຂາຍ ---%0A${sellerInfo.replace(/\n/g, '%0A')}`;
        message += `%0A%0Aຂອບໃຈທີ່ໃຊ້ບໍລິການ ສະບາຍໃຈ ຫວຍ 🎰`;
        
        return message;
    }

    function sendToFacebook() {
        if(cart.length === 0) {
            alert("ກະລຸນາເພີ່ມເລກຫວຍໃສ່ກະຕ່າກ່ອນ");
            return;
        }
        const message = getOrderMessage();
        // ເປີດ Messenger ກັບຜູ້ຂາຍ (ປ່ຽນເປັນ Facebook ID ຂອງທ່ານ)
        const fbUrl = `https://m.me/100063618581398?text=${message}`;
        window.open(fbUrl, '_blank');
    }

    function sendToWhatsApp() {
        if(cart.length === 0) {
            alert("ກະລຸນາເພີ່ມເລກຫວຍໃສ່ກະຕ່າກ່ອນ");
            return;
        }
        const message = getOrderMessage();
        // ເປີດ WhatsApp ກັບເບີຜູ້ຂາຍ (ປ່ຽນເປັນເບີຂອງທ່ານ)
        const phone = "8562055555555"; // ປ່ຽນເປັນເບີໂທຜູ້ຂາຍ
        const waUrl = `https://wa.me/${phone}?text=${message}`;
        window.open(waUrl, '_blank');
    }

    document.getElementById("addToCartBtn")?.addEventListener("click", addToCart);
    document.getElementById("sendFBBtn")?.addEventListener("click", sendToFacebook);
    document.getElementById("sendWABtn")?.addEventListener("click", sendToWhatsApp);
    document.getElementById("checkoutBtn")?.addEventListener("click", () => {
        if(cart.length === 0) {
            alert("ກະລຸນາເພີ່ມເລກຫວຍກ່ອນ");
        } else {
            // ໃຫ້ຜູ້ໃຊ້ເລືອກຊ່ອງທາງ
            if(confirm("ຢາກສົ່ງຄຳສັ່ງຜ່ານ Facebook Messenger ຫຼື WhatsApp?\nກົດ OK = Facebook, Cancel = WhatsApp")) {
                sendToFacebook();
            } else {
                sendToWhatsApp();
            }
        }
    });

    loadCart();
</script>
</body>
</html>
